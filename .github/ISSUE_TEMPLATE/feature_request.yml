name: Feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What you are trying to do that is hard or impossible today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New provider adapter
        - Discord channel
        - Email channel
        - Transcription backend
        - Plugin behavior
        - Docs / learning paths
    validations:
      required: true
